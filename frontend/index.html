<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claudio FM</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Unbounded:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23d4a373'/><text x='50' y='62' text-anchor='middle' font-size='36' fill='%23181310'>♪</text></svg>" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <!-- Nav -->
    <nav class="nav">
      <div class="nav-left">
        <div class="nav-avatar">♪</div>
        <span class="nav-title">Claudio</span>
      </div>
      <div class="nav-actions">
        <button class="nav-btn bell-btn" id="bell-btn" title="场景建议" style="display:none">
          <span id="bell-badge" class="bell-badge" style="display:none">0</span>
          🔔
        </button>
        <button class="nav-btn" id="theme-toggle">LIGHT</button>
      <button class="nav-btn" id="settings-toggle" title="设置">⚙</button>
      </div>
    </nav>

    <!-- Clock -->
    <section class="clock-section">
      <div class="clock-display" id="clock">00:00</div>
      <div class="clock-date">
        <span class="clock-weekday" id="weekday">MON</span>
        <span class="clock-date-str" id="date-str">01 JAN 2026</span>
      </div>
      <div class="on-air" id="on-air">
        <span class="on-air-dot"></span>
        ON AIR
      </div>
    </section>

    <!-- Player -->
    <section class="player">
      <div class="player-top">
        <div class="player-info">
          <div class="track-title">
            <div class="waveform paused" id="waveform">
              <span></span><span></span><span></span><span></span>
            </div>
            <div class="player-track" id="now-playing">Claudio</div>
          </div>
          <div class="player-status">READY</div>
        </div>
        <div class="player-controls">
          <button class="ctrl-btn" id="prev-btn" title="上一首">⏮</button>
          <button class="ctrl-btn" id="play-btn" title="播放/暂停">▶</button>
          <button class="ctrl-btn" id="next-btn" title="下一首">⏭</button>
          <button class="ctrl-btn" id="love-btn" title="收藏">♡</button>
          <button class="ctrl-btn text" id="hide-btn" title="隐藏">HIDE</button>
          <input type="range" id="volume" min="0" max="100" value="80" title="音量" />
        </div>
      </div>
      <div class="player-bottom">
        <div class="progress-container">
          <div id="progress-bar" style="width:0%"></div>
        </div>
        <div class="time-labels">
          <span id="current-time">0:00</span>
          <span id="duration">0:00</span>
        </div>
          <div class="arc-indicator" id="arc-indicator" style="display:none"></div>
      </div>
    </section>

    <!-- Chat -->
    <section class="chat-section">
      <div class="chat-header">
        <div class="chat-tabs">
          <button class="chat-tab active" data-tab="chat">CHAT</button>
          <button class="chat-tab" data-tab="queue">QUEUE <span id="queue-count" class="tab-badge">0</span></button>
          <button class="chat-tab" data-tab="favs">FAVS <span id="favs-count" class="tab-badge">0</span></button>
          <button class="chat-tab" data-tab="stats">STATS</button>
        </div>
        <span id="token-usage" class="token-usage"></span>
      </div>
      <div class="panel chat-panel" id="chat-panel">
        <div class="chat-messages" id="chat-messages"></div>
      </div>
      <div class="panel queue-panel" id="queue-panel" style="display:none"></div>
      <div class="panel favs-panel" id="favs-panel" style="display:none"></div>
      <div class="panel stats-panel" id="stats-panel" style="display:none"></div>
    </section>

    <!-- Input -->
    <section class="input-section">
      <div class="input-row">
        <input type="text" id="chat-input" placeholder="Say something to the DJ …" autocomplete="off" />
        <button class="send-btn" id="send-btn">↑</button>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span>Claudio FM</span>
      <div class="footer-right">
        <span class="ncm-status" id="ncm-status" title="网易云 API">
          <span class="ncm-dot"></span>
          <span class="ncm-label">NCM</span>
        </span>
        <span id="connection-status" class="disconnected">DISCONNECTED</span>
      </div>
    </footer>

    <div class="toast-container" id="toast-container"></div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Settings</span>
        <button class="modal-close" id="settings-close">✕</button>
      </div>
      <div class="modal-body">
        <fieldset class="form-fieldset">
          <legend class="form-legend">Anthropic</legend>
          <div class="form-group">
            <label class="form-label" for="settings-api-key">API Key</label>
            <input type="text" id="settings-api-key" class="form-input" placeholder="sk-ant-..." autocomplete="off" />
          </div>
          <div class="form-group">
            <label class="form-label" for="settings-base-url">Base URL</label>
            <input type="url" id="settings-base-url" class="form-input" placeholder="https://api.anthropic.com" autocomplete="off" />
          </div>
        </fieldset>

        <fieldset class="form-fieldset">
          <legend class="form-legend">NetEase Cloud Music</legend>
          <div class="form-group">
            <label class="form-label" for="settings-ncm-api">API 地址</label>
            <input type="url" id="settings-ncm-api" class="form-input" placeholder="http://localhost:3001" autocomplete="off" />
          </div>
        </fieldset>

        <fieldset class="form-fieldset">
          <legend class="form-legend">OpenWeather</legend>
          <div class="form-group">
            <label class="form-label" for="settings-weather-key">API Key</label>
            <input type="text" id="settings-weather-key" class="form-input" placeholder="OpenWeather API Key" autocomplete="off" />
          </div>
        </fieldset>

        <fieldset class="form-fieldset">
          <legend class="form-legend">Fish Audio TTS</legend>
          <div class="form-group">
            <label class="form-label" for="settings-fish-key">API Key</label>
            <input type="text" id="settings-fish-key" class="form-input" placeholder="Fish Audio API Key" autocomplete="off" />
          </div>
        </fieldset>

        <fieldset class="form-fieldset">
          <legend class="form-legend">飞书</legend>
          <div class="form-group">
            <label class="form-label" for="settings-feishu-app-id">App ID</label>
            <input type="text" id="settings-feishu-app-id" class="form-input" placeholder="cli_..." autocomplete="off" />
          </div>
          <div class="form-group">
            <label class="form-label" for="settings-feishu-app-secret">App Secret</label>
            <input type="text" id="settings-feishu-app-secret" class="form-input" placeholder="App Secret" autocomplete="off" />
          </div>
        </fieldset>

        <fieldset class="form-fieldset">
          <legend class="form-legend">UPnP</legend>
          <div class="form-group">
            <label class="form-label" for="settings-upnp-devices">设备列表 (JSON)</label>
            <input type="text" id="settings-upnp-devices" class="form-input" placeholder='[{"id":"light1","name":"卧室灯","host":"192.168.1.100"}]' autocomplete="off" />
          </div>
        </fieldset>

        <div class="form-status" id="settings-status"></div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn secondary" id="settings-test">Test Connection</button>
        <button class="modal-btn primary" id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
