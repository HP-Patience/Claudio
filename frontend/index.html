<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claudio FM</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Unbounded:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23d4a373'/><text x='50' y='62' text-anchor='middle' font-size='36' fill='%23181310'>♪</text></svg>" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <!-- Nav -->
    <nav class="nav">
      <div class="nav-left">
        <div class="nav-avatar">♪</div>
        <span class="nav-title">Claudio</span>
      </div>
      <div class="nav-actions">
        <button class="nav-btn" id="ncm-login-btn" title="网易云登录">LOGIN</button>
        <button class="nav-btn bell-btn" id="bell-btn" title="场景建议" style="display:none">
          <span id="bell-badge" class="bell-badge" style="display:none">0</span>
          🔔
        </button>
        <button class="nav-btn" id="theme-toggle">LIGHT</button>
      <button class="nav-btn" id="settings-toggle" title="设置">⚙</button>
      </div>
    </nav>

    <!-- Clock -->
    <section class="clock-section">
      <div class="clock-display" id="clock">00:00</div>
      <div class="clock-date">
        <span class="clock-weekday" id="weekday">MON</span>
        <span class="clock-date-str" id="date-str">01 JAN 2026</span>
      </div>
      <div class="on-air" id="on-air">
        <span class="on-air-dot"></span>
        ON AIR
      </div>
    </section>

    <!-- Player -->
    <section class="player">
      <div class="player-top">
        <div class="player-info">
          <div class="track-title">
            <div class="waveform paused" id="waveform">
              <span></span><span></span><span></span><span></span>
            </div>
            <div class="player-track" id="now-playing">Claudio</div>
            <span class="fm-badge" id="fm-badge" style="display:none">FM</span>
            <span class="smart-badge" id="smart-badge" style="display:none">SMART</span>
          </div>
          <div class="player-status">READY</div>
        </div>
      </div>
      <div class="transport-bar">
          <div class="transport-left">
            <button class="ctrl-btn" id="fm-btn" title="私人FM">FM</button>
            <button class="ctrl-btn" id="smart-btn" title="心动模式">SMART</button>
          </div>
          <div class="transport-center">
            <button class="ctrl-btn" id="love-btn" title="收藏"></button>
            <div class="playmode-wrap">
              <button class="ctrl-btn" id="playmode-btn" title="播放模式"></button>
              <div class="playmode-dropdown" id="playmode-dropdown" style="display:none"></div>
            </div>
            <button class="ctrl-btn" id="prev-btn" title="上一首"></button>
            <button class="ctrl-btn" id="play-btn" title="播放/暂停"></button>
            <button class="ctrl-btn" id="next-btn" title="下一首"></button>
            <button class="ctrl-btn" id="lyric-toggle-btn" title="歌词"></button>
          </div>
          <div class="transport-right">
            <button class="ctrl-btn text" id="hide-btn" title="隐藏">HIDE</button>
            <button class="ctrl-btn text" id="similar-btn" title="相似推荐">相似</button>
            <div class="add-to-playlist-wrap">
              <button class="ctrl-btn text" id="add-to-playlist-btn" title="添加到歌单">+LIST</button>
              <div class="add-to-playlist-dropdown" id="add-to-playlist-dropdown" style="display:none"></div>
            </div>
            <input type="range" id="volume" min="0" max="100" value="80" title="音量" />
          </div>
        </div>
      <div class="player-bottom">
        <div class="progress-container">
          <div id="progress-bar" style="width:0%"></div>
        </div>
        <div class="time-labels">
          <span id="current-time">0:00</span>
          <span id="duration">0:00</span>
        </div>
          <div class="arc-indicator" id="arc-indicator" style="display:none"></div>
      </div>

      <div class="lyrics-container empty" id="lyrics-container">
        <div class="lyric-line prev" id="lyric-prev"></div>
        <div class="lyric-line curr" id="lyric-curr"></div>
        <div class="lyric-line next" id="lyric-next"></div>
      </div>
    </section>

    <!-- Chat -->
    <section class="chat-section">
      <div class="chat-header">
        <div class="chat-tabs">
          <button class="chat-tab active" data-tab="chat">CHAT</button>
          <button class="chat-tab" data-tab="queue">QUEUE <span id="queue-count" class="tab-badge">0</span></button>
          <button class="chat-tab" data-tab="favs">FAVS <span id="favs-count" class="tab-badge">0</span></button>
          <button class="chat-tab" data-tab="stats">STATS</button>
          <button class="chat-tab" data-tab="playlists">PLAYLISTS</button>
          <button class="chat-tab" data-tab="history">HISTORY</button>
        </div>
        <span id="token-usage" class="token-usage"></span>
      </div>
      <div class="panel chat-panel" id="chat-panel">
        <div class="chat-messages" id="chat-messages"></div>
      </div>
      <div class="panel queue-panel" id="queue-panel" style="display:none"></div>
      <div class="panel favs-panel" id="favs-panel" style="display:none"></div>
      <div class="panel stats-panel" id="stats-panel" style="display:none"></div>
      <div class="panel playlists-panel" id="playlists-panel" style="display:none"></div>
      <div class="panel history-panel" id="history-panel" style="display:none"></div>
    </section>

    <!-- Input -->
    <section class="input-section">
      <div class="input-row">
        <input type="text" id="chat-input" placeholder="Say something to the DJ …" autocomplete="off" />
        <button class="send-btn" id="send-btn">↑</button>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span>Claudio FM</span>
      <div class="footer-right">
        <span class="ncm-status" id="ncm-status" title="网易云 API">
          <span class="ncm-dot"></span>
          <span class="ncm-label">NCM</span>
        </span>
        <span id="connection-status" class="disconnected">DISCONNECTED</span>
      </div>
    </footer>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Settings</span>
        <button class="modal-close" id="settings-close">✕</button>
      </div>
      <div class="modal-body">
        <fieldset class="form-fieldset">
          <legend class="form-legend">LLM</legend>
          <div class="form-group">
            <label class="form-label" for="settings-api-key">API Key</label>
            <input type="text" id="settings-api-key" class="form-input" placeholder="sk-..." autocomplete="off" />
          </div>
          <div class="form-group">
            <label class="form-label" for="settings-base-url">Base URL</label>
            <input type="url" id="settings-base-url" class="form-input" placeholder="https://api.deepseek.com" autocomplete="off" />
          </div>
          <div class="form-group">
            <label class="form-label" for="settings-api-model">Model</label>
            <div class="input-row">
              <div class="model-input-wrap">
                <input type="text" id="settings-api-model" class="form-input" placeholder="deepseek-v4-flash" autocomplete="off" />
                <button class="form-btn-small" id="settings-fetch-models" title="拉取模型列表">▼</button>
                <div class="model-dropdown" id="model-dropdown"></div>
              </div>
            </div>
          </div>
          <div class="form-group toggle-group" style="margin-top:8px">
            <label class="form-label" for="settings-llm-enabled">启用 LLM</label>
            <label class="toggle-switch">
              <input type="checkbox" id="settings-llm-enabled" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-group toggle-group" style="margin-top:8px">
            <label class="form-label" for="settings-scene-suggestions-enabled">场景推荐</label>
            <label class="toggle-switch">
              <input type="checkbox" id="settings-scene-suggestions-enabled" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </fieldset>

        <fieldset class="form-fieldset">
          <legend class="form-legend">NetEase Cloud Music</legend>
          <div class="form-group">
            <label class="form-label" for="settings-ncm-api">API 地址</label>
            <input type="url" id="settings-ncm-api" class="form-input" placeholder="http://localhost:3001" autocomplete="off" />
          </div>
          <div class="form-group">
            <label class="form-label" for="settings-ncm-quality">音质</label>
            <select id="settings-ncm-quality" class="form-input">
              <option value="">默认 (320k)</option>
              <option value="standard">标准 128k</option>
              <option value="high">高清 192k</option>
              <option value="exhigh">极高 320k</option>
              <option value="lossless">无损 FLAC</option>
            </select>
          </div>
        </fieldset>

        <fieldset class="form-fieldset">
          <legend class="form-legend">心知天气</legend>
          <div class="form-group">
            <label class="form-label" for="settings-weather-key">API Key</label>
            <input type="text" id="settings-weather-key" class="form-input" placeholder="心知天气 API Key" autocomplete="off" />
          </div>
        </fieldset>

        <fieldset class="form-fieldset">
          <legend class="form-legend">Fish Audio TTS</legend>
          <div class="form-group">
            <label class="form-label" for="settings-fish-key">API Key</label>
            <input type="text" id="settings-fish-key" class="form-input" placeholder="Fish Audio API Key" autocomplete="off" />
          </div>
        </fieldset>

        <fieldset class="form-fieldset">
          <legend class="form-legend">飞书</legend>
          <div class="form-group">
            <label class="form-label" for="settings-feishu-app-id">App ID</label>
            <input type="text" id="settings-feishu-app-id" class="form-input" placeholder="cli_..." autocomplete="off" />
          </div>
          <div class="form-group">
            <label class="form-label" for="settings-feishu-app-secret">App Secret</label>
            <input type="text" id="settings-feishu-app-secret" class="form-input" placeholder="App Secret" autocomplete="off" />
          </div>
        </fieldset>

        <fieldset class="form-fieldset">
          <legend class="form-legend">UPnP</legend>
          <div class="form-group">
            <label class="form-label" for="settings-upnp-devices">设备列表 (JSON)</label>
            <input type="text" id="settings-upnp-devices" class="form-input" placeholder='[{"id":"light1","name":"卧室灯","host":"192.168.1.100"}]' autocomplete="off" />
          </div>
        </fieldset>

        <div class="form-status" id="settings-status"></div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn secondary" id="settings-test">Test Connection</button>
        <button class="modal-btn primary" id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <!-- NCM Login Modal -->
  <div class="modal-overlay" id="ncm-login-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">网易云登录</span>
        <button class="modal-close" id="ncm-login-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="login-tabs">
          <button class="login-tab active" data-login-tab="qr">二维码</button>
          <button class="login-tab" data-login-tab="pwd">密码</button>
        </div>

        <!-- QR login panel -->
        <div class="login-panel" id="login-qr-panel">
          <div class="qr-container" id="qr-container">
            <div class="qr-placeholder" id="qr-placeholder">获取二维码中...</div>
            <img id="qr-image" class="qr-image" style="display:none" alt="扫码登录" />
          </div>
          <div class="login-status" id="qr-status">等待扫码...</div>
        </div>

        <!-- Password login panel -->
        <div class="login-panel" id="login-pwd-panel" style="display:none">
          <div class="form-group">
            <label class="form-label">手机号</label>
            <input type="text" id="login-phone" class="form-input" placeholder="手机号" autocomplete="off" />
          </div>
          <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" id="login-password" class="form-input" placeholder="密码" autocomplete="off" />
          </div>
          <!-- Captcha section (hidden until 462) -->
          <div id="login-captcha-section" style="display:none">
            <div class="form-group">
              <label class="form-label">短信验证码</label>
              <div style="display:flex;gap:8px">
                <input type="text" id="login-captcha" class="form-input" placeholder="验证码" autocomplete="off" style="flex:1" />
                <button class="modal-btn" id="login-send-captcha-btn" style="white-space:nowrap;flex-shrink:0">发送验证码</button>
              </div>
            </div>
            <div class="login-status" id="pwd-captcha-status"></div>
          </div>
          <div class="login-status" id="pwd-login-status"></div>
          <button class="modal-btn primary" id="pwd-login-btn" style="width:100%;margin-top:8px">登录</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Playlist Modal -->
  <div class="modal-overlay" id="playlist-create-modal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <span class="modal-title">创建歌单</span>
        <button class="modal-close" id="playlist-create-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="playlist-name">歌单名称</label>
          <input type="text" id="playlist-name" class="form-input" placeholder="输入歌单名称..." autocomplete="off" />
        </div>
        <div class="form-group playlist-privacy">
          <label class="form-label">隐私设置</label>
          <label class="checkbox-label">
            <input type="checkbox" id="playlist-private" />
            <span>私密歌单</span>
          </label>
        </div>
        <div class="form-status" id="playlist-create-status"></div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn secondary" id="playlist-create-cancel">取消</button>
        <button class="modal-btn primary" id="playlist-create-confirm">创建</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
